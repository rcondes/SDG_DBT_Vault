version: 2

models:
  - name: stg_customer
    config:
      tags: ['staging']
    description: "Staging para raw_customer: limpieza mínima y mapeo de columnas."
    columns:
      - name: customer_id
        description: "Clave de cliente (business key) proveniente de c_custkey"
        tests: [not_null]
      - name: customer_name
        description: "Nombre del cliente (c_name)"
        tests: [not_null]
      - name: address
        description: "Dirección del cliente (c_address)"
      - name: nation_id
        description: "FK a nation (c_nationkey)"
      - name: phone
        description: "Teléfono (c_phone)"
      - name: account_balance
        description: "Saldo de cuenta (c_acctbal)"
      - name: market_segment
        description: "Segmento de mercado (c_mktsegment)"
      - name: comment
        description: "Comentario libre (c_comment)"
      - name: load_timestamp
        description: "Timestamp de carga proveniente del raw (c_load_timestamp)"
      - name: version
        description: "Periodo/version proveniente del raw (c_version)"
      - name: record_source
        description: "Origen del registro (p. ej. 'raw_customer')"

  - name: stg_orders
    config:
      tags: ['staging']
    description: "Staging para raw_orders: mapeo y limpieza mínima."
    columns:
      - name: order_id
        description: "Clave de pedido (o_orderkey)"
        tests: [not_null]
      - name: customer_id
        description: "FK a cliente (o_custkey)"
        tests: [not_null]
      - name: order_status
        description: "Estado del pedido (o_orderstatus)"
      - name: total_price
        description: "Importe total (o_totalprice)"
      - name: order_date
        description: "Fecha de pedido (o_orderdate)"
      - name: order_priority
        description: "Prioridad del pedido (o_orderpriority)"
      - name: clerk
        description: "Clerk (o_clerk)"
      - name: ship_priority
        description: "Ship priority (o_shippriority)"
      - name: comment
        description: "Comentario (o_comment)"
      - name: load_timestamp
        description: "Timestamp de carga (o_load_timestamp)"
      - name: version
        description: "Periodo/version (o_version)"
      - name: record_source
        description: "Origen del registro (p. ej. 'raw_orders')"

  - name: stg_lineitem
    config:
      tags: ['staging']
    description: "Staging para raw_lineitem: mapeo y normalización de columnas."
    columns:
      - name: order_id
        description: "FK a orders (l_orderkey)"
        tests: [not_null]
      - name: line_number
        description: "Número de línea (l_linenumber)"
        tests: [not_null]
      - name: part_id
        description: "FK a part (l_partkey)"
      - name: supplier_id
        description: "FK a supplier (l_suppkey)"
      - name: quantity
        description: "Cantidad (l_quantity)"
      - name: extended_price
        description: "Precio extendido (l_extendedprice)"
      - name: discount
        description: "Descuento (l_discount)"
      - name: tax
        description: "Impuesto (l_tax)"
      - name: return_flag
        description: "Return flag (l_returnflag)"
      - name: line_status
        description: "Estado de la línea (l_linestatus)"
      - name: ship_date
        description: "Fecha de envío (l_shipdate)"
      - name: commit_date
        description: "Fecha de commit (l_commitdate)"
      - name: receipt_date
        description: "Fecha de recepción (l_receiptdate)"
      - name: ship_instruct
        description: "Instrucciones de envío (l_shipinstruct)"
      - name: ship_mode
        description: "Modo de envío (l_shipmode)"
      - name: comment
        description: "Comentario (l_comment)"
      - name: load_timestamp
        description: "Timestamp de carga (l_load_timestamp)"
      - name: version
        description: "Periodo/version (l_version)"
      - name: record_source
        description: "Origen del registro (p. ej. 'raw_lineitem')"

  - name: stg_part
    config:
      tags: ['staging']
    description: "Staging para raw_part: mapeo y limpieza mínima."
    columns:
      - name: part_id
        description: "Clave de parte (p_partkey)"
        tests: [not_null]
      - name: part_name
        description: "Nombre de la parte (p_name)"
        tests: [not_null]
      - name: manufacturer
        description: "Fabricante (p_mfgr)"
      - name: brand
        description: "Marca (p_brand)"
      - name: type
        description: "Tipo (p_type)"
      - name: size
        description: "Tamaño (p_size)"
      - name: container
        description: "Contenedor (p_container)"
      - name: retail_price
        description: "Precio de venta (p_retailprice)"
      - name: comment
        description: "Comentario (p_comment)"
      - name: load_timestamp
        description: "Timestamp de carga (p_load_timestamp)"
      - name: version
        description: "Periodo/version (p_version)"
      - name: record_source
        description: "Origen del registro (p. ej. 'raw_part')"

  - name: stg_supplier
