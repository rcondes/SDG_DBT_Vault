      tags: ['staging']
    description: "Staging para raw_supplier: mapeo y normalización."
    columns:
      - name: supplier_id
        description: "Clave de proveedor (s_suppkey)"
        tests: [not_null]
      - name: supplier_name
        description: "Nombre del proveedor (s_name)"
        tests: [not_null]
      - name: address
        description: "Dirección del proveedor (s_address)"
      - name: nation_id
        description: "FK a nation (s_nationkey)"
      - name: phone
        description: "Teléfono (s_phone)"
      - name: account_balance
        description: "Saldo de cuenta proveedor (s_acctbal)"
      - name: comment
        description: "Comentario (s_comment)"
      - name: load_timestamp
        description: "Timestamp de carga (s_load_timestamp)"
      - name: version
        description: "Periodo/version (s_version)"
      - name: record_source
        description: "Origen del registro (p. ej. 'raw_supplier')"

  - name: stg_partsupp
    config:
      tags: ['staging']
    description: "Staging para raw_partsupp: mapeo y limpieza mínima."
    columns:
      - name: part_id
        description: "FK a part (ps_partkey)"
        tests: [not_null]
      - name: supplier_id
        description: "FK a supplier (ps_suppkey)"
        tests: [not_null]
      - name: avail_quantity
        description: "Cantidad disponible (ps_availqty)"
      - name: supply_cost
        description: "Coste de suministro (ps_supplycost)"
      - name: comment
        description: "Comentario (ps_comment)"
      - name: load_timestamp
        description: "Timestamp de carga (ps_load_timestamp)"
      - name: version
        description: "Periodo/version (ps_version)"
      - name: record_source
        description: "Origen del registro (p. ej. 'raw_partsupp')"

  - name: stg_nation
    config:
      tags: ['staging']
    description: "Staging para raw_nation: mapeo y normalización."
    columns:
      - name: nation_id
        description: "Clave de nation (n_nationkey)"
        tests: [not_null]
      - name: nation_name
        description: "Nombre de la nación (n_name)"
        tests: [not_null]
      - name: region_id
        description: "FK a region (n_regionkey)"
      - name: comment
        description: "Comentario (n_comment)"
      - name: load_timestamp
        description: "Timestamp de carga (n_load_timestamp)"
      - name: version
        description: "Periodo/version (n_version)"
      - name: record_source
        description: "Origen del registro (p. ej. 'raw_nation')"

  - name: stg_region
    config:
      tags: ['staging']
    description: "Staging para raw_region: mapeo y normalización."
    columns:
      - name: region_id
        description: "Clave de region (r_regionkey)"
        tests: [not_null]
      - name: region_name
        description: "Nombre de la región (r_name)"
        tests: [not_null]
      - name: comment
        description: "Comentario (r_comment)"
      - name: load_timestamp
