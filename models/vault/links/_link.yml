version: 1

models:
  - name: link_order_part
    config:
      tags: ['link']
    description: "Link entre orders y parts (lineitems)"
    columns:
      - name: link_key
        tests: [not_null, unique]
      - name: hub_order_key
        tests: [not_null]
      - name: hub_part_key
        tests: [not_null]
      - name: order_id
        tests: [not_null]
      - name: line_number
      - name: part_id
      - name: load_dttm
      - name: record_source

  - name: link_part_supplier
    config:
      tags: ['link']
    description: "Link entre parts y suppliers (partsupp)"
    columns:
      - name: link_key
        tests: [not_null, unique]
      - name: hub_part_key
        tests: [not_null]
      - name: hub_supplier_key
        tests: [not_null]
      - name: part_id
        tests: [not_null]
      - name: supplier_id
        tests: [not_null]
      - name: load_dttm
      - name: record_source
