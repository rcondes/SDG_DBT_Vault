version: 2

models:
  - name: hub_customer
    config:
      tags: ['hub']
    description: "Hub de clientes: una fila por business key"
    columns:
      - name: customer_hk
        description: "Hash de la business key (md5 lower)"
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Clave de negocio original"
        tests:
          - not_null
          - unique
      - name: load_timestamp
        description: "Fecha/hora en que se detectó por primera vez la business key"
      - name: record_source

  - name: hub_orders
    config:
      tags: ['hub']
    description: "Hub de pedidos: una fila por business key"
    columns:
      - name: order_hk
        tests:
          - not_null
          - unique
      - name: order_id
        tests:
          - not_null
          - unique
      - name: load_timestamp
      - name: record_source

  - name: hub_part
    config:
      tags: ['hub']
    description: "Hub de partes: una fila por business key"
    columns:
      - name: part_hk
        tests:
          - not_null
          - unique
      - name: part_id
        tests:
          - not_null
          - unique
      - name: load_timestamp
      - name: record_source

  - name: hub_supplier
    config:
      tags: ['hub']
    description: "Hub de proveedores: una fila por business key"
    columns:
      - name: supplier_hk
        tests:
          - not_null
          - unique
      - name: supplier_id
        tests:
          - not_null
          - unique
      - name: load_timestamp
      - name: record_source

  - name: hub_nation
    config:
      tags: ['hub']
    description: "Hub de nation: referencia geográfica"
    columns:
      - name: nation_hk
        tests:
          - not_null
          - unique
      - name: nation_id
        tests:
          - not_null
          - unique
      - name: load_timestamp
      - name: record_source

  - name: hub_region
    config:
      tags: ['hub']
    description: "Hub de region: referencia geográfica"
    columns:
      - name: region_hk
        tests:
          - not_null
          - unique
      - name: region_id
        tests:
          - not_null
          - unique
      - name: load_timestamp
      - name: record_source
