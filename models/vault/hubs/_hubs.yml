version: 1

models:
  - name: hub_customer
    config:
      tags: ['hub']
    description: "Hub de clientes: una fila por business key"
    columns:
      - name: hub_key
        description: "Hash de la business key (md5 lower)"
        tests:
          - not_null
          - unique
      - name: business_key
        description: "Clave de negocio original (c_custkey)"
        tests:
          - not_null
          - unique
      - name: first_seen_dttm
        description: "Fecha/hora en que se detectó por primera vez la business key"
      - name: record_source
        description: "Origen del registro"

  - name: hub_orders
    config:
      tags: ['hub']
    description: "Hub de pedidos: una fila por business key"
    columns:
      - name: hub_key
        tests:
          - not_null
          - unique
      - name: business_key
        tests:
          - not_null
          - unique
      - name: first_seen_dttm
      - name: record_source

  - name: hub_part
    config:
      tags: ['hub']
    description: "Hub de partes: una fila por business key"
    columns:
      - name: hub_key
        tests:
          - not_null
          - unique
      - name: business_key
        tests:
          - not_null
          - unique
      - name: first_seen_dttm
      - name: record_source

  - name: hub_supplier
    config:
      tags: ['hub']
    description: "Hub de proveedores: una fila por business key"
    columns:
      - name: hub_key
        tests:
          - not_null
          - unique
      - name: business_key
        tests:
          - not_null
          - unique
      - name: first_seen_dttm
      - name: record_source

  - name: hub_nation
    config:
      tags: ['hub']
    description: "Hub de nation: referencia geográfica"
    columns:
      - name: hub_key
        tests:
          - not_null
          - unique
      - name: business_key
        tests:
          - not_null
          - unique
      - name: first_seen_dttm
      - name: record_source

  - name: hub_region
    config:
      tags: ['hub']
    description: "Hub de region: referencia geográfica"
    columns:
      - name: hub_key
        tests:
          - not_null
          - unique
      - name: business_key
        tests:
          - not_null
          - unique
      - name: first_seen_dttm
      - name: record_source
