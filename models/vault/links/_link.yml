version: 2

models:
  - name: link_order_part
    description: "Link que relaciona órdenes con sus partes (lineitem)."
    columns:
      - name: link_key
        tests: 
          - not_null
          - unique
      - name: hub_order_key
        tests: 
          - not_null
      - name: hub_part_key
        tests: 
          - not_null
      - name: load_dttm
        tests: 
          - not_null

  - name: link_part_supplier
    description: "Link que relaciona partes con sus proveedores (partsupp)."
    columns:
      - name: link_key
        tests: 
          - not_null
          - unique
      - name: hub_part_key
        tests: 
          - not_null
      - name: hub_supplier_key
        tests: 
          - not_null
      - name: load_dttm
        tests: 
          - not_null